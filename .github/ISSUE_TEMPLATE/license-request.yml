name: Ember 授权申请
description: 已在 Gitee 指定 issue 评论机器码后，在这里提交授权申请。
title: "[授权申请] "
labels:
  - license-request
body:
  - type: markdown
    attributes:
      value: |
        请先在指定 Gitee issue 中使用自己的 Gitee 账号评论机器码，再提交本申请。
        GitHub Action 会自动校验 Gitee 评论并签发当前机器授权。
  - type: input
    id: machine_code
    attributes:
      label: 机器码
      description: 从 Ember 授权页复制，格式类似 WBV7-UD2U-GAMJ-XHEF-TRB5-N74G。
      placeholder: WBV7-UD2U-GAMJ-XHEF-TRB5-N74G
    validations:
      required: true
  - type: input
    id: gitee_user_id
    attributes:
      label: Gitee 用户 ID
      description: 填写你评论机器码时使用的 Gitee 用户名或数字 ID。
      placeholder: your-gitee-id
    validations:
      required: true
  - type: input
    id: gitee_comment_url
    attributes:
      label: Gitee 评论链接
      description: 填写你在指定 Gitee issue 评论机器码后的评论链接，至少需要是对应 issue 链接。
      placeholder: https://gitee.com/owner/repo/issues/IXXXXXX#note_123456
    validations:
      required: true
