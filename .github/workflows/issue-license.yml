name: 手动签发 Ember 授权

on:
  workflow_dispatch:
    inputs:
      machine_code:
        description: "Ember 授权页显示的机器码"
        required: true
        type: string
      provider:
        description: "授权来源平台"
        required: true
        default: "gitee"
        type: string
      user_id:
        description: "授权来源用户 ID"
        required: true
        type: string
      days:
        description: "授权天数"
        required: true
        default: "30"
        type: string
      edition:
        description: "授权版本"
        required: true
        default: "free"
        type: string

permissions:
  contents: write

concurrency:
  group: ember-license-manual
  cancel-in-progress: false

jobs:
  issue:
    runs-on: ubuntu-latest

    env:
      MACHINE_CODE: ${{ inputs.machine_code }}
      LICENSE_PROVIDER: ${{ inputs.provider }}
      LICENSE_USER_ID: ${{ inputs.user_id }}
      LICENSE_DAYS: ${{ inputs.days }}
      LICENSE_EDITION: ${{ inputs.edition }}
      EMBER_LICENSE_PRIVATE_KEY_B64: ${{ secrets.EMBER_LICENSE_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Issue license
        shell: bash
        run: |
          node <<'NODE'
          const { createHash, createSign, randomUUID } = require('node:crypto');
          const { execFileSync, spawnSync } = require('node:child_process');
          const { existsSync, mkdirSync, readFileSync, unlinkSync, writeFileSync } = require('node:fs');
          const { dirname } = require('node:path');

          const env = process.env;

          function requireValue(value, message) {
            if (!value || !String(value).trim()) throw new Error(message);
            return String(value).trim();
          }

          function normalizeMachineCode(value) {
            return requireValue(value, '缺少机器码').trim().toUpperCase();
          }

          function assertSafeSegment(value, label) {
            const text = requireValue(value, `缺少${label}`);
            if (!/^[a-zA-Z0-9_.-]{1,64}$/.test(text)) {
              throw new Error(`${label}只能包含字母、数字、点、下划线和短横线`);
            }
            return text;
          }

          function sha256Hex(value) {
            return createHash('sha256').update(value, 'utf8').digest('hex');
          }

          function base64Url(buffer) {
            return Buffer.from(buffer)
              .toString('base64')
              .replace(/=+$/u, '')
              .replace(/\+/gu, '-')
              .replace(/\//gu, '_');
          }

          function readPositiveInteger(value, label, fallback) {
            const number = Number.parseInt(value || fallback, 10);
            if (!Number.isFinite(number) || number <= 0) {
              throw new Error(`${label}必须是大于 0 的整数`);
            }
            return number;
          }

          function issueLicense(machineCode, provider, userId) {
            const privateKeyB64 = requireValue(env.EMBER_LICENSE_PRIVATE_KEY_B64, '缺少 GitHub Secret: EMBER_LICENSE_PRIVATE_KEY_B64');
            const privateKey = Buffer.from(privateKeyB64, 'base64').toString('utf8');
            const days = readPositiveInteger(env.LICENSE_DAYS, '授权天数', '30');
            const edition = requireValue(env.LICENSE_EDITION || 'free', '缺少授权版本');

            const machineCodeHash = sha256Hex(machineCode);
            const accountPath = `accounts/${provider}/${userId}.json`;
            const licensePath = `licenses/${machineCodeHash}.lic`;
            let rebind = null;

            if (existsSync(accountPath)) {
              const account = JSON.parse(readFileSync(accountPath, 'utf8'));
              if (account.machineCodeHash && account.machineCodeHash !== machineCodeHash) {
                const previousLicensePath = typeof account.licensePath === 'string' && account.licensePath.startsWith('licenses/')
                  ? account.licensePath
                  : `licenses/${account.machineCodeHash}.lic`;

                if (existsSync(previousLicensePath)) {
                  unlinkSync(previousLicensePath);
                }

                rebind = {
                  previousMachineCodeHash: account.machineCodeHash,
                  previousLicensePath,
                };
              }
            }

            const issuedAt = new Date();
            const expiresAt = new Date(issuedAt.getTime() + days * 24 * 60 * 60 * 1000);
            const payload = {
              product: 'Ember',
              licenseId: randomUUID(),
              licenseeProvider: provider,
              licenseeUserId: userId,
              machineCodeHash,
              edition,
              issuedAtUtc: issuedAt.toISOString(),
              expiresAtUtc: expiresAt.toISOString(),
            };

            const payloadBytes = Buffer.from(JSON.stringify(payload), 'utf8');
            const signature = createSign('RSA-SHA256')
              .update(payloadBytes)
              .end()
              .sign(privateKey);

            mkdirSync(dirname(accountPath), { recursive: true });
            mkdirSync(dirname(licensePath), { recursive: true });

            writeFileSync(accountPath, `${JSON.stringify({
              provider,
              userId,
              machineCodeHash,
              licensePath,
              manual: true,
              githubRun: `${env.GITHUB_SERVER_URL}/${env.GITHUB_REPOSITORY}/actions/runs/${env.GITHUB_RUN_ID}`,
              updatedAtUtc: issuedAt.toISOString(),
            }, null, 2)}\n`, 'utf8');

            writeFileSync(licensePath, `${base64Url(payloadBytes)}.${base64Url(signature)}\n`, 'utf8');
            return { provider, userId, machineCodeHash, licensePath, expiresAtUtc: payload.expiresAtUtc, rebind };
          }

          function commitLicenseFiles(result) {
            execFileSync('git', ['config', 'user.name', 'github-actions[bot]'], { stdio: 'inherit' });
            execFileSync('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], { stdio: 'inherit' });
            execFileSync('git', ['add', 'accounts', 'licenses'], { stdio: 'inherit' });

            const diff = spawnSync('git', ['diff', '--cached', '--quiet']);
            if (diff.status === 0) return false;

            execFileSync('git', ['commit', '-m', `feat: 手动签发 Ember 授权 ${result.provider}/${result.userId}`], { stdio: 'inherit' });
            execFileSync('git', ['push'], { stdio: 'inherit' });
            return true;
          }

          function writeSummary(result, committed) {
            const lines = [
              '## Ember 授权已手动签发',
              '',
              `- 授权账号: \`${result.provider}/${result.userId}\``,
              `- 机器码哈希: \`${result.machineCodeHash}\``,
              `- 到期时间: \`${result.expiresAtUtc}\``,
              `- 授权文件: \`${result.licensePath}\``,
              `- 已提交仓库: \`${committed ? '是' : '否'}\``,
            ];

            if (result.rebind) {
              lines.push(
                `- 旧机器码哈希: \`${result.rebind.previousMachineCodeHash}\``,
                `- 旧远端授权文件: \`${result.rebind.previousLicensePath}\` 已删除`,
              );
            }

            writeFileSync(env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`, 'utf8');
          }

          function main() {
            const machineCode = normalizeMachineCode(env.MACHINE_CODE);
            if (!/^[A-Z0-9]{4}(?:-[A-Z0-9]{4}){5}$/.test(machineCode)) {
              throw new Error('机器码格式无效，请从 Ember 授权页复制完整机器码');
            }

            const provider = assertSafeSegment(env.LICENSE_PROVIDER || 'gitee', '授权来源平台');
            const userId = assertSafeSegment(env.LICENSE_USER_ID, '授权来源用户 ID');
            const result = issueLicense(machineCode, provider, userId);
            const committed = commitLicenseFiles(result);
            writeSummary(result, committed);

            console.log(result.rebind ? '授权已自动换绑并手动签发。' : '授权已手动签发。');
            console.log(`授权账号: ${result.provider}/${result.userId}`);
            console.log(`授权文件: ${result.licensePath}`);
            console.log(`到期时间: ${result.expiresAtUtc}`);
          }

          main();
          NODE
